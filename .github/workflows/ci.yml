name: CI Colhe+

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Etapa 1: clona o repositório
      - name: Clonar repositório
        uses: actions/checkout@v4

      # Etapa 2: configura o Java com cache do Maven embutido
      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # Etapa 3: análise de qualidade com Checkstyle
      - name: Verificar qualidade do código (Checkstyle)
        run: mvn checkstyle:check
        # lê as regras definidas em checkstyle.xml e falha o pipeline
        # se o código violar padrões de formatação/estilo
        # ex: nomes de variáveis, tamanho de métodos, imports não usados

      # Etapa 4: compila e gera o .jar SEM rodar testes ainda
      - name: Build com Maven
        run: mvn clean package -DskipTests
        # se o build falhar, você sabe que é problema de compilação
        # e não de teste ou qualidade

      # Etapa 5: roda os testes separadamente
      - name: Rodar testes
        run: mvn test
        # falha aqui = problema de lógica/regra de negócio
